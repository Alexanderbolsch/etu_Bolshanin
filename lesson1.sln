#include <stdio.h> 
#include <locale.h> 
#include <ctype.h> // Для проверки символов
#include <iostream>

int Arcan(int day, int month, int year) {
    // Суммируем цифры даты рождения 
    int sum = 0;
    sum += (day / 10) + (day % 10); // Суммируем десятки и единицы дня 
    sum += (month / 10) + (month % 10); // Суммируем десятки и единицы месяца 
    sum += (year / 1000) + ((year / 100) % 10) + ((year / 10) % 10) + (year % 10); // Суммируем все цифры года 

    // Если сумма больше 22, вычитаем 22 (добавляем ещё одно такое же условие, на
    // случай, если сумма будет всё равно больше 22)
    if (sum > 22) {
        sum -= 22;
    }
    if (sum > 22) {
        sum -= 22;
    }
    

    return sum;
}

int main() {
    setlocale(LC_ALL, "Russian");
    int day, month, year;
    char input[20]; // Буфер для ввода даты
    int dots = 0; // Счетчик точек

    printf("Введите дату рождения (пример: день.месяц.год): ");
    scanf_s("%s", input, sizeof(input));

    // Проверка количества символов
    if ( (strlen(input)) > 10) {
        printf("Некорректный ввод. Слишком много символов.\n");
        return 1; // Выход из программы с кодом ошибки
    }

    // Проверка на допустимые символы и количество точек
    for (int i = 0; input[i] != '\0'; i++) {
        if (!isdigit(input[i])) {
            if (input[i] == '.') {
                dots++;
                if (dots > 2) {
                    printf("Некорректный ввод. Слишком много точек.\n");
                    return 1; // Выход из программы с кодом ошибки
                }
            }
            else {
                printf("Некорректный ввод. Введите только цифры и точку.\n");
                return 1; // Выход из программы с кодом ошибки
            }
        }
    }

    sscanf_s(input, "%d.%d.%d", &day, &month, &year);

    int arcana = Arcan(day, month, year);
    printf("Ваш аркан: %d", arcana);

    return 0;
}
